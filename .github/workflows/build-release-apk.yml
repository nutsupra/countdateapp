# --------------------------------------------------
# CountDateApp APK Builder
# Fast build + clean old releases
# --------------------------------------------------

name: Build and Release APK

on:
  workflow_dispatch:

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    # --------------------------------------------------
    # Checkout repository
    # --------------------------------------------------
    - name: Checkout source
      uses: actions/checkout@v4

    # --------------------------------------------------
    # Setup Node (Ionic / React build)
    # --------------------------------------------------
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: npm

    # --------------------------------------------------
    # Install dependencies (เร็วกว่า npm install)
    # --------------------------------------------------
    - name: Install dependencies
      run: npm ci

    # --------------------------------------------------
    # Build web assets
    # --------------------------------------------------
    - name: Build web app
      run: npm run build

    # --------------------------------------------------
    # Setup Capacitor Android
    # --------------------------------------------------
    - name: Setup Capacitor Android
      run: |
        npm install @capacitor/android
        npx cap add android || true
        npx cap sync android

    # --------------------------------------------------
    # Setup Java for Android build
    # --------------------------------------------------
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
        cache: gradle

    # --------------------------------------------------
    # Build APK
    # --------------------------------------------------
    - name: Build APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    # --------------------------------------------------
    # Rename APK
    # --------------------------------------------------
    - name: Rename APK
      run: |
        mkdir release
        cp android/app/build/outputs/apk/debug/app-debug.apk release/countdateapp.apk

    # --------------------------------------------------
    # Delete old releases
    # --------------------------------------------------
    - name: Delete old releases
      uses: dev-drprasad/delete-older-releases@v0.3.4
      with:
        keep_latest: 0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # --------------------------------------------------
    # Create new release
    # --------------------------------------------------
    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest-build
        name: Latest APK Build
        files: release/countdateapp.apk
