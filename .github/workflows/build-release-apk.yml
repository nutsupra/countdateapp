# -------------------------------------------------------
# CountDateApp APK Builder (Stable / Hardened CI)
# Designed for Ionic + Capacitor Android build
# -------------------------------------------------------

name: Build and Release APK

on:
  workflow_dispatch:

jobs:

  build:

    runs-on: ubuntu-22.04   # pin OS เพื่อลด environment drift

    steps:

    # ---------------------------------------------------
    # Checkout source
    # ---------------------------------------------------
    - name: Checkout source
      uses: actions/checkout@v4

    # ---------------------------------------------------
    # Setup Node (pin version)
    # ---------------------------------------------------
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 18.19
        cache: npm

    # ---------------------------------------------------
    # Install dependencies
    # ใช้ lockfile → reproducible build
    # ---------------------------------------------------
    - name: Install dependencies
      run: npm ci

    # ---------------------------------------------------
    # Build web assets
    # ---------------------------------------------------
    - name: Build web assets
      run: npm run build

    # ---------------------------------------------------
    # Setup Android SDK
    # ---------------------------------------------------
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # ---------------------------------------------------
    # Install required Android SDK components
    # lock build-tools + platform
    # ---------------------------------------------------
    - name: Install Android SDK packages
      run: |
        sdkmanager "platform-tools"
        sdkmanager "platforms;android-34"
        sdkmanager "build-tools;34.0.0"

    # ---------------------------------------------------
    # Setup Capacitor Android
    # ---------------------------------------------------
    - name: Setup Capacitor
      run: |
        npm install @capacitor/android
        npx cap add android || true
        npx cap sync android

    # ---------------------------------------------------
    # Setup Java (Gradle)
    # ---------------------------------------------------
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
        cache: gradle

    # ---------------------------------------------------
    # Gradle build
    # --no-daemon ลด memory issue
    # ---------------------------------------------------
    - name: Build Android APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon --stacktrace

    # ---------------------------------------------------
    # Prepare APK file
    # ---------------------------------------------------
    - name: Prepare release file
      run: |
        mkdir release
        cp android/app/build/outputs/apk/debug/app-debug.apk release/countdateapp.apk

    # ---------------------------------------------------
    # Delete old releases
    # ---------------------------------------------------
    - name: Delete old releases
      uses: dev-drprasad/delete-older-releases@v0.3.4
      with:
        keep_latest: 0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # ---------------------------------------------------
    # Create GitHub Release
    # ---------------------------------------------------
    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: Latest APK Build
        files: release/countdateapp.apk
